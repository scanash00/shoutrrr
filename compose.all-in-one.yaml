# All-in-one deployment: a single container whose s6-overlay supervises the
# Octane web server plus the queue worker, scheduler, and (when toggled) SSR.
#
#   docker compose -f compose.all-in-one.yaml up --build
#       -> SQLite, one container running everything.
#
#   INERTIA_SSR_ENABLED=true ... up --build   -> also runs the in-container SSR process.
#   ... --profile postgres --profile redis    -> external Postgres/Redis (see notes in
#                                                 compose.standalone.yaml).
name: laravel-template-aio

x-environment: &app-env
    APP_NAME: "${APP_NAME:-Laravel}"
    APP_ENV: "${APP_ENV:-production}"
    APP_KEY: "${APP_KEY}"
    APP_DEBUG: "${APP_DEBUG:-false}"
    APP_URL: "${APP_URL:-http://localhost:8080}"
    OCTANE_SERVER: "frankenphp"
    DB_CONNECTION: "${DB_CONNECTION:-sqlite}"
    # NOTE: for Postgres set DB_CONNECTION=pgsql AND override DB_DATABASE=laravel (the
    # sqlite-path default below is invalid for pgsql). See compose.standalone.yaml header.
    DB_DATABASE: "${DB_DATABASE:-/var/www/html/database/sqlite/database.sqlite}"
    DB_HOST: "${DB_HOST:-postgres}"
    DB_PORT: "${DB_PORT:-5432}"
    DB_USERNAME: "${DB_USERNAME:-laravel}"
    DB_PASSWORD: "${DB_PASSWORD:-secret}"
    CACHE_STORE: "${CACHE_STORE:-database}"
    QUEUE_CONNECTION: "${QUEUE_CONNECTION:-database}"
    SESSION_DRIVER: "${SESSION_DRIVER:-database}"
    REDIS_HOST: "${REDIS_HOST:-redis}"
    REDIS_PORT: "${REDIS_PORT:-6379}"
    # In-container SSR uses localhost
    INERTIA_SSR_ENABLED: "${INERTIA_SSR_ENABLED:-false}"
    INERTIA_SSR_URL: "${INERTIA_SSR_URL:-http://127.0.0.1:13714}"

services:
    app:
        build:
            context: .
            dockerfile: docker/Dockerfile
            target: all-in-one
            args:
                SERVERSIDEUP_PHP_VERSION: "${SERVERSIDEUP_PHP_VERSION:-8.5-frankenphp-trixie}"
                POSTGRES_VERSION: "${POSTGRES_VERSION:-17}"
        image: "${REGISTRY_IMAGE:-laravel-template-aio}:${IMAGE_TAG:-latest}"
        restart: unless-stopped
        environment:
            <<: *app-env
        ports:
            - "${APP_PORT:-8080}:8080"
        volumes:
            - storage:/var/www/html/storage
            - sqlite:/var/www/html/database/sqlite
        stop_grace_period: 60s
        healthcheck:
            test: ["CMD", "healthcheck-octane"]
            start_period: 15s
            interval: 30s
            timeout: 10s
            retries: 3

    postgres:
        profiles: ["postgres"]
        image: "postgres:${POSTGRES_VERSION:-17}"
        restart: unless-stopped
        environment:
            POSTGRES_DB: "${POSTGRES_DB:-laravel}"
            POSTGRES_USER: "${DB_USERNAME:-laravel}"
            POSTGRES_PASSWORD: "${DB_PASSWORD:-secret}"
        volumes:
            - pgdata:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-laravel} -d ${POSTGRES_DB:-laravel}"]
            interval: 10s
            timeout: 5s
            retries: 5

    redis:
        profiles: ["redis"]
        image: "redis:${REDIS_VERSION:-8}"
        restart: unless-stopped
        volumes:
            - redisdata:/data
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5

volumes:
    storage:
    sqlite:
    pgdata:
    redisdata:
