# Standalone deployment: one image, run as several containers with different
# entry points (web/octane, queue worker, scheduler, optional SSR).
#
#   docker compose -f compose.standalone.yaml up --build
#       -> SQLite + app + worker + scheduler (zero external services)
#
#   ... --profile postgres --profile redis --profile ssr up --build
#       -> also starts Postgres, Redis, and the Inertia SSR process.
#          For Postgres set in your .env: DB_CONNECTION=pgsql, DB_HOST=postgres,
#          DB_DATABASE=laravel, DB_USERNAME=laravel, DB_PASSWORD=secret.
#          For Redis set: CACHE_STORE=redis, QUEUE_CONNECTION=redis, REDIS_HOST=redis.
name: laravel-template-standalone

x-environment: &app-env
    APP_NAME: "${APP_NAME:-Laravel}"
    APP_ENV: "${APP_ENV:-production}"
    APP_KEY: "${APP_KEY}"
    APP_DEBUG: "${APP_DEBUG:-false}"
    APP_URL: "${APP_URL:-http://localhost:8080}"
    OCTANE_SERVER: "frankenphp"
    # --- Database: SQLite by default. Switch to Postgres via .env + --profile postgres ---
    DB_CONNECTION: "${DB_CONNECTION:-sqlite}"
    DB_DATABASE: "${DB_DATABASE:-/var/www/html/database/sqlite/database.sqlite}"
    DB_HOST: "${DB_HOST:-postgres}"
    DB_PORT: "${DB_PORT:-5432}"
    DB_USERNAME: "${DB_USERNAME:-laravel}"
    DB_PASSWORD: "${DB_PASSWORD:-secret}"
    # --- Cache/Queue/Session: database by default. Switch to Redis via .env + --profile redis ---
    CACHE_STORE: "${CACHE_STORE:-database}"
    QUEUE_CONNECTION: "${QUEUE_CONNECTION:-database}"
    SESSION_DRIVER: "${SESSION_DRIVER:-database}"
    REDIS_HOST: "${REDIS_HOST:-redis}"
    REDIS_PORT: "${REDIS_PORT:-6379}"
    # --- Inertia SSR: off by default ---
    INERTIA_SSR_ENABLED: "${INERTIA_SSR_ENABLED:-false}"
    INERTIA_SSR_URL: "${INERTIA_SSR_URL:-http://ssr:13714}"

x-app: &app
    build:
        context: .
        dockerfile: docker/Dockerfile
        target: standalone
        args:
            SERVERSIDEUP_PHP_VERSION: "${SERVERSIDEUP_PHP_VERSION:-8.5-frankenphp-trixie}"
            POSTGRES_VERSION: "${POSTGRES_VERSION:-17}"
    image: "${REGISTRY_IMAGE:-laravel-template}:${IMAGE_TAG:-latest}"
    restart: unless-stopped
    volumes:
        - storage:/var/www/html/storage
        - sqlite:/var/www/html/database/sqlite

services:
    app:
        <<: *app
        environment:
            <<: *app-env
        ports:
            - "${APP_PORT:-8080}:8080"
        stop_grace_period: 30s
        healthcheck:
            test: ["CMD", "healthcheck-octane"]
            start_period: 10s
            interval: 30s
            timeout: 10s
            retries: 3

    worker:
        <<: *app
        command: ["php", "artisan", "queue:work", "--tries=3", "--max-time=3600"]
        environment:
            <<: *app-env
        depends_on:
            - app
        stop_signal: SIGTERM
        # Give queue:work room to finish the in-flight job before SIGKILL.
        stop_grace_period: 40s
        healthcheck:
            test: ["CMD", "healthcheck-queue"]
            start_period: 10s

    scheduler:
        <<: *app
        command: ["php", "artisan", "schedule:work"]
        environment:
            <<: *app-env
        depends_on:
            - app
        stop_grace_period: 15s
        healthcheck:
            test: ["CMD", "healthcheck-schedule"]
            start_period: 10s

    ssr:
        <<: *app
        profiles: ["ssr"]
        command: ["php", "artisan", "inertia:start-ssr", "--runtime=bun"]
        environment:
            <<: *app-env
            INERTIA_SSR_ENABLED: "true"
        depends_on:
            - app
        stop_grace_period: 15s

    postgres:
        profiles: ["postgres"]
        image: "postgres:${POSTGRES_VERSION:-17}"
        restart: unless-stopped
        environment:
            POSTGRES_DB: "${POSTGRES_DB:-laravel}"
            POSTGRES_USER: "${DB_USERNAME:-laravel}"
            POSTGRES_PASSWORD: "${DB_PASSWORD:-secret}"
        volumes:
            - pgdata:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-laravel} -d ${POSTGRES_DB:-laravel}"]
            interval: 10s
            timeout: 5s
            retries: 5

    redis:
        profiles: ["redis"]
        image: "redis:${REDIS_VERSION:-8}"
        restart: unless-stopped
        volumes:
            - redisdata:/data
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5

volumes:
    storage:
    sqlite:
    pgdata:
    redisdata:
